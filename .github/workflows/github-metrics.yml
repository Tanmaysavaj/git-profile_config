name: GitHub Metrics

on:
  # Refreshes the metrics card daily so the README stays current.
  schedule:
    - cron: "40 5 * * *"

  # Allows manual refresh after profile or repository changes.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    name: Generate GitHub metrics
    runs-on: ubuntu-latest

    steps:
      # Generates github-metrics.svg in the repository root.
      # GITHUB_TOKEN is enough for public profile metrics.
      - name: Build metrics SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Tanmaysavaj
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Toronto
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
